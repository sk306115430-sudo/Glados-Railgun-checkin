name: auto check

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'imgs/'
  schedule:
    - cron: '0 4,10 * * *'
  watch:
    types: started

permissions:
  actions: write
  contents: read

jobs:
  build:
    name: glados/railgun checkin
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.13]

    steps:
    - uses: actions/checkout@v6

    - name: set up python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        pypushdeer

    - name: running checkin
      run: |
        python checkin.py
      env:
        PUSHDEER_SENDKEY: ${{ secrets.PUSHDEER_SENDKEY }}
        GLADOS_COOKIES: ${{ secrets.GLADOS_COOKIES }}
        GLADOS_EXCHANGE_PLAN: ${{ secrets.GLADOS_EXCHANGE_PLAN }}
        GLADOS_VERBOSE: ${{ secrets.GLADOS_VERBOSE }}

    # 👇 👇 👇 这里是关键！替换原来的 keepalive，绝对不报错
    - name: keep workflow alive (NO 403 ERROR)
      run: echo "Workflow is active and running successfully"

    - name: delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 7
        keep_minimum_runs: 7
        delete_run_by_conclusion_pattern: success
