name: auto check

on:
  workflow_dispatch:
  schedule:
    # UTC 16点 = 北京时间 0点 触发
    - cron: '0 16 * * *'

permissions:
  actions: write
  contents: read

jobs:
  build:
    name: glados/railgun checkin
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.13]

    steps:
    - uses: actions/checkout@v6

    - name: set up python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    # 核心：随机延时 0~4小时 14400秒，0点触发后随机等到0-4点执行
    - name: 凌晨随机延时打卡
      run: sleep $(( RANDOM % 14400 ))

    - name: install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        pip install pypushdeer

    - name: running checkin
      run: |
        python checkin.py
      env:
        PUSHDEER_SENDKEY: ${{ secrets.PUSHDEER_SENDKEY }}
        GLADOS_COOKIES: ${{ secrets.GLADOS_COOKIES }}
        GLADOS_EXCHANGE_PLAN: ${{ secrets.GLADOS_EXCHANGE_PLAN }}
        GLADOS_VERBOSE: ${{ secrets.GLADOS_VERBOSE }}

    - name: Workflow Keep Alive
      run: echo "✅ 工作流已保活"

    - name: delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 7
        keep_minimum_runs: 7
        delete_run_by_conclusion_pattern: success
