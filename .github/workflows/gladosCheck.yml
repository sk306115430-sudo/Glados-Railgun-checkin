name: auto check

on:
  workflow_dispatch:
  schedule:
    # 触发点：UTC 时间 18:00（对应北京时间 凌晨 2:00）
    # 然后加随机延迟，让实际打卡落在 0:00 ~ 6:00 之间
    - cron: '0 18 * * *'

permissions:
  actions: write
  contents: read

jobs:
  build:
    name: glados/railgun checkin
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.13]

    steps:
    - uses: actions/checkout@v6

    - name: set up python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    # 👇 关键：随机延迟，让打卡时间落在凌晨 0:00 ~ 6:00 之间
    - name: 随机延迟 0~4 小时（北京时间 2:00~6:00 之间）
      run: sleep $(( RANDOM % 14400 ))

    - name: install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        pip install pypushdeer

    - name: running checkin
      run: |
        python checkin.py
      env:
        PUSHDEER_SENDKEY: ${{ secrets.PUSHDEER_SENDKEY }}
        GLADOS_COOKIES: ${{ secrets.GLADOS_COOKIES }}
        GLADOS_EXCHANGE_PLAN: ${{ secrets.GLADOS_EXCHANGE_PLAN }}
        GLADOS_VERBOSE: ${{ secrets.GLADOS_VERBOSE }}

    - name: delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 7
        keep_minimum_runs: 7
        delete_run_by_conclusion_pattern: success
